<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portal Alpitel</title>
    <link rel="stylesheet" href="style_portal.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect x='24' y='10' width='16' height='36' fill='%23008C45'/><rect x='24' y='50' width='16' height='6' fill='%23CD212A'/></svg>">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="logo-area">
                <!-- Representação da logo Alpitel -->
                <h1>ALP<span>I</span>TEL</h1>
                <p>Sistemas Operacionais</p>
            </div>
            
            <form id="login-form">
                <div class="input-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" placeholder="Digite seu usuário" required>
                </div>
                <div class="input-group">
                    <label for="password">Senha</label>
                    <div style="position: relative;">
                        <input type="password" id="password" placeholder="••••••••" required style="width: 100%; padding-right: 45px;">
                        <span id="toggle-pass" class="material-icons" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.2rem; user-select: none; color: #94a3b8;">visibility</span>
                    </div>
                </div>
                <button type="submit" class="btn-login">Entrar no Portal</button>
            </form>
            
            <div id="error-msg" class="error-msg hidden">Usuário ou senha incorretos.</div>
            
            <footer class="login-footer">
                <p>© 2026 Alpitel Energy - Create By: Wilson borges xavier junior</p>
            </footer>
        </div>
    </div>
    <script src="auth.js"></script>
    <script>
        const passInput = document.getElementById('password');
        const togglePass = document.getElementById('toggle-pass');

        if (togglePass) {
            togglePass.addEventListener('click', () => {
                const isPass = passInput.type === 'password';
                passInput.type = isPass ? 'text' : 'password';
                togglePass.textContent = isPass ? 'visibility_off' : 'visibility';
                togglePass.style.color = isPass ? 'var(--primary)' : '#94a3b8';
            });
        }
    </script>
</body>
</html>
